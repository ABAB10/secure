{% extends 'base.html' %}

{% block title %}Changer mon mot de passe - AuthSecure{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="fas fa-key"></i> Changer mon mot de passe</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Ancien mot de passe</label>
                        {{ form.old_password }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Nouveau mot de passe</label>
                        {{ form.new_password1 }}
                        <small class="text-muted">Au moins 8 caractères. Pas trop commun.</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Confirmer le nouveau mot de passe</label>
                        {{ form.new_password2 }}
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-save"></i> Changer le mot de passe
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
