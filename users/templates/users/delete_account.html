{% extends 'base.html' %}

{% block title %}Supprimer mon compte - AuthSecure{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Supprimer mon compte</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-warning">
                    <i class="fas fa-warning"></i>
                    <strong>Attention !</strong> Cette action est irréversible. Toutes vos données seront supprimées.
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Confirmez votre mot de passe</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    
                    <div class="text-center">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Êtes-vous sûr de vouloir supprimer définitivement votre compte ?')">
                            <i class="fas fa-trash"></i> Supprimer définitivement
                        </button>
                        <a href="{% url 'users:profile' %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
